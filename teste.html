<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Pratico - Prodemge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
     rel="stylesheet">
</head>
<body>
 
<div class="container mt-4">

   <form>

    <div class="row g-3 align-items-end mb-3">

    <!-- Data: Tipo data-->
    <div class="col-md-2">
      <label for="data" class="form-label fw-bold">Data:</label>
      <input type="date" id="data" class="form-control" required>
   </div>

    <!-- selecao de serviço -->
    <div class="col-md-3">
    <label for="servico" class="form-label fw-bold">Serviço:</label>
    <select id="servico" class="form-select" required>
        <option value="">Selecione</option>
        <option value="1">Serviço 1</option>
        <option value="2">Serviço 2</option>
        <option value="3">Serviço 3</option>
    </select>
  </div>

    <!--Quantidade: Campo numérico com valor mínimo 1 e máximo 100. -->
   <div class="col-md-2">
      <label for="quantidade" class="form-label fw-bold">Quantidade:</label>
      <input type="number" class="form-control" id="quantidade" min="1" max="100">
   </div>

  <!-- Campo numérico com no máximo 4 dígitos. --> 
   <div class="col-md-2">
    <label for="job" class="form-label fw-bold">Job</label>
    <input type="number" class="form-control" id="job"  min="0" max="9999"  oninput="this.value=this.value.slice(0,4)">
   </div>

   <!-- Campo de texto com limite de 9 caracteres. --> 
   <div class="col-md-3">
    <label for="ocr" class="form-label fw-bold">OCR</label>
    <input type="text" class="form-control" id="ocr" maxlength="9">
   </div>
</div>

<!-- botoes -->
<div class="d-flex">
         <button type="submit" class="btn btn-primary me-2">Salvar</button>
         <button type="reset" class="btn btn-danger">Cancelar</button>
      </div>
</form>

</body>
</html>
